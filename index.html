<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script>window.react = window.React;</script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/lucide-react@0.395.0/dist/umd/lucide-react.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceArea } = Recharts;
const { Droplets, FlaskConical, Plus, X, Trash2, Settings2, ChevronRight,
        AlertTriangle, CheckCircle2, Waves, ListPlus } = LucideReact;

const C = {
  bg: "#0B2027", card: "#123138", border: "#1B3E45",
  text: "#EAF6F6", muted: "#7FA8AA", faint: "#5E8688", accent: "#4FD1C5",
  danger: "#E8583F", dangerBg: "#2A1A18", dangerBorder: "#5C2E28",
  goodBg: "#122B22", goodBorder: "#215239",
};
const FONT_DISPLAY = "'Space Grotesk', sans-serif";
const FONT_MONO    = "'IBM Plex Mono', monospace";
const FONT_BODY    = "'IBM Plex Sans', sans-serif";

const GLOBAL_CSS = `
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap');
.pd-input:focus { outline: none; border-color: #4FD1C5 !important; }
.pd-icon-btn:hover { background: #123138; }
.pd-delete:hover { color: #E8583F !important; }
.pd-btn-primary:active { transform: scale(0.98); }
.pd-pill { transition: background-color .15s, border-color .15s, color .15s; }
@keyframes pd-fade-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes pd-fade-out { from { opacity:1; } to { opacity:0; } }
.pd-toast { animation: pd-fade-in .2s ease forwards; }
`;

const PARAM_DEFS = [
  { key:"fc",   label:"Free Chlorine",     short:"FC",   unit:"ppm", chip:"#F4CD46", step:0.5, min:0,  max:20   },
  { key:"cc",   label:"Combined Chlorine", short:"CC",   unit:"ppm", chip:"#F4CD46", step:0.1, min:0,  max:5,   infoOnly:true },
  { key:"ph",   label:"pH",                short:"pH",   unit:"",    chip:"#E8583F", step:0.1, min:6,  max:9    },
  { key:"ta",   label:"Total Alkalinity",  short:"TA",   unit:"ppm", chip:"#48C9B0", step:5,   min:0,  max:300  },
  { key:"ch",   label:"Calcium Hardness",  short:"CH",   unit:"ppm", chip:"#B48EE8", step:10,  min:0,  max:1000 },
  { key:"cya",  label:"Stabilizer / CYA",  short:"CYA",  unit:"ppm", chip:"#F2954A", step:5,   min:0,  max:200  },
  { key:"salt", label:"Salt",              short:"Salt", unit:"ppm", chip:"#5DC7E8", step:50,  min:0,  max:6000 },
  { key:"temp", label:"Water Temp",        short:"Temp", unit:"°C",  chip:"#8FB8BA", step:1,   min:0,  max:50,  infoOnly:true },
];

const DEFAULT_TARGETS = {
  fc:[3,5], cc:[0,0.5], ph:[7.2,7.8], ta:[60,90],
  ch:[250,350], cya:[60,80], salt:[2700,3400], temp:[24,29],
};

const DEFAULT_PROFILE = {
  name:"my pool", volumeL:77000, poolType:"saltwater",
  chlorineBoost:"calhypo", calHypoPct:68, liquidChlorinePct:12,
  phLowerMethod:"phminus", muriaticPct:31.45, targets:DEFAULT_TARGETS,
};

function loadJSON(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
  catch { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch { return false; }
}

function uid() { return Math.random().toString(36).slice(2, 10); }
function fmt(n, d=1) {
  if (n===null||n===undefined||Number.isNaN(n)) return "—";
  return (Math.round(n*10**d)/10**d).toString();
}

function doseFCRaiseLiquid(delta,vol,pct)  { return delta<=0?null:{amount:(delta*vol/1000)/(pct/100),unit:"mL",label:`${fmt(pct,1)}% liquid chlorine`}; }
function doseFCRaiseCalHypo(delta,vol,pct) { return delta<=0?null:{amount:(delta*vol/1000)/(pct/100),unit:"g", label:`cal-hypo shock (${fmt(pct,0)}%)`}; }
function dosePHRaise(delta,vol)            { return delta<=0?null:{amount:delta*(vol/1000)*22.5,unit:"g",label:"soda ash"}; }
function dosePHLowerMuriatic(delta,vol,pct){ return delta<=0?null:{amount:delta*(vol/1000)*46.9*(31.45/pct),unit:"mL",label:`${fmt(pct,2)}% muriatic acid`}; }
function dosePHLowerDryAcid(delta,vol)     { return delta<=0?null:{amount:delta*(vol/1000)*46.9*0.72,unit:"g",label:"pH Minus (sodium bisulfate)"}; }
function doseTARaise(delta,vol)  { return delta<=0?null:{amount:delta*(vol/1000)*1.8,unit:"g",label:"baking soda"}; }
function doseCHRaise(delta,vol)  { return delta<=0?null:{amount:delta*(vol/1000)*1.5,unit:"g",label:"calcium chloride"}; }
function doseCYARaise(delta,vol) { return delta<=0?null:{amount:delta*(vol/1000)*1.0,unit:"g",label:"cyanuric acid (stabilizer)"}; }
function doseSaltRaise(delta,vol){ return delta<=0?null:{amount:delta*(vol/1000)*1.0,unit:"g",label:"pool salt (NaCl)"}; }

function weightAmount(amount, unit) {
  if (unit==="g"  && amount>=1000) return `${fmt(amount/1000,2)} kg`;
  if (unit==="mL" && amount>=1000) return `${fmt(amount/1000,2)} L`;
  return `${fmt(amount,amount<10?2:0)} ${unit}`;
}

function statusFor(key, value, targets) {
  const t = targets[key];
  if (value===undefined||value===null||value==="") return "none";
  const v = parseFloat(value);
  if (Number.isNaN(v)) return "none";
  if (v<t[0]) return "low";
  if (v>t[1]) return "high";
  return "good";
}

function recommendation(def, value, targets, profile) {
  if (def.infoOnly) return null;
  const t = targets[def.key];
  const status = statusFor(def.key, value, targets);
  if (status==="none"||status==="good") return null;
  const v = parseFloat(value);
  const isSWG = profile.poolType === "saltwater";

  if (def.key==="fc") {
    const target = t[1];
    const base = isSWG ? "Bump your SWG output % (or run time) to raise chlorine production."
                       : "Check your chlorinator output and run time.";
    if (status==="low") {
      if (profile.chlorineBoost==="pucks") return { text:`${base} Pucks feed slowly — keep a shock on hand for fast bumps.` };
      if (profile.chlorineBoost==="liquid") {
        const d = doseFCRaiseLiquid(target-v, profile.volumeL, profile.liquidChlorinePct);
        return { text:d?`${base} For a same-day boost: ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ${fmt(target)} ppm.`:base };
      }
      const d = doseFCRaiseCalHypo(target-v, profile.volumeL, profile.calHypoPct);
      return { text:d?`${base} For a same-day boost: ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ${fmt(target)} ppm.`:base };
    }
    return { text: isSWG ? "Above target — ease off the SWG output % for a bit; it'll drift down on its own"
                         : "Above target — reduce chlorinator output; it'll drift down on its own" };
  }
  if (def.key==="cc") {
    if (v>t[1]) return { text:"Combined chlorine is climbing — a shock (superchlorinate) is usually the fix" };
    return null;
  }
  if (def.key==="ph") {
    const target = (t[0]+t[1])/2;
    if (status==="low") {
      const d = dosePHRaise(target-v, profile.volumeL);
      return d ? { text:`Add ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ~${fmt(target,1)}` } : null;
    }
    if (profile.phLowerMethod==="muriatic") {
      const d = dosePHLowerMuriatic(v-target, profile.volumeL, profile.muriaticPct);
      return d ? { text:`Add ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ~${fmt(target,1)}` } : null;
    }
    const d = dosePHLowerDryAcid(v-target, profile.volumeL);
    return d ? { text:`Add ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ~${fmt(target,1)}. Dose in steps — dry acid is an estimate (±20%).` } : null;
  }
  if (def.key==="ta") {
    if (status==="low") { const d=doseTARaise(t[1]-v,profile.volumeL); return d?{text:`Add ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ${fmt(t[1])} ppm`}:null; }
    return { text:"Above target — dilute with fresh water over time to bring it down" };
  }
  if (def.key==="ch") {
    if (status==="low") { const d=doseCHRaise(t[0]-v,profile.volumeL); return d?{text:`Add ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ${fmt(t[0])} ppm`}:null; }
    return { text:"Above target — dilution is the only real fix" };
  }
  if (def.key==="cya") {
    if (status==="low") { const d=doseCYARaise(t[0]-v,profile.volumeL); return d?{text:`Add ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ${fmt(t[0])} ppm`}:null; }
    return { text:"Above target — dilute with fresh water to bring it down" };
  }
  if (def.key==="salt") {
    if (status==="low") { const d=doseSaltRaise(t[1]-v,profile.volumeL); return d?{text:`Add ${weightAmount(d.amount,d.unit)} of ${d.label} to reach ${fmt(t[1])} ppm`}:null; }
    return { text:"Above target — dilute with fresh water to bring it down" };
  }
  return null;
}

function validateForm(form) {
  const errors = {};
  for (const def of PARAM_DEFS) {
    const raw = form[def.key];
    if (raw===undefined||raw==="") continue;
    const v = parseFloat(raw);
    if (Number.isNaN(v)) { errors[def.key]=`${def.short}: not a number`; continue; }
    if (v<def.min||v>def.max) errors[def.key]=`${def.short} should be ${def.min}–${def.max}${def.unit?" "+def.unit:""}`;
  }
  return errors;
}

function useToast() {
  const [toast, setToast] = useState(null);
  const show = (msg, type="ok") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2800);
  };
  return [toast, show];
}

function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div className="pd-toast" style={{
      position:"fixed", bottom:80, left:"50%", transform:"translateX(-50%)",
      background:toast.type==="ok"?C.goodBg:C.dangerBg,
      border:`1px solid ${toast.type==="ok"?C.goodBorder:C.dangerBorder}`,
      borderRadius:10, padding:"8px 14px", display:"flex", alignItems:"center", gap:8,
      fontSize:12.5, color:C.text, zIndex:100, whiteSpace:"nowrap",
      boxShadow:"0 4px 16px rgba(0,0,0,0.4)",
    }}>
      {toast.type==="ok"
        ? <CheckCircle2 size={14} color={C.accent} />
        : <AlertTriangle size={14} color={C.danger} />}
      {toast.msg}
    </div>
  );
}

function NavButton({ active, onClick, icon, label }) {
  const color = active ? C.accent : C.faint;
  return (
    <button onClick={onClick} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, padding:"4px 16px", background:"none", border:"none" }}>
      <span style={{ color }}>{icon}</span>
      <span style={{ fontSize:10, color }}>{label}</span>
    </button>
  );
}

function ParamCard({ def, value, profileArg }) {
  const targets = profileArg.targets;
  const status  = statusFor(def.key, value, targets);
  const rec     = recommendation(def, value, targets, profileArg);
  const t       = targets[def.key];
  const statusColor = { good:C.accent, low:C.danger, high:C.danger, none:"#3D6367" }[status];
  return (
    <div style={{ borderRadius:16, background:C.card, border:`1px solid ${C.border}`, padding:"14px 16px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ width:12, height:12, borderRadius:999, background:def.chip, flexShrink:0,
            boxShadow:value!==undefined&&value!==""?`0 0 0 3px ${def.chip}22`:"none", display:"inline-block" }} />
          <div>
            <div style={{ fontSize:13.5, fontWeight:500 }}>{def.label}</div>
            <div style={{ fontFamily:FONT_MONO, fontSize:10.5, color:C.faint }}>
              target {t[0]}–{t[1]}{def.unit?` ${def.unit}`:""}
            </div>
          </div>
        </div>
        <div style={{ fontFamily:FONT_MONO, color:statusColor, fontSize:18, fontWeight:600, lineHeight:1 }}>
          {value===undefined||value===""?"—":`${value}${def.unit?` ${def.unit}`:""}`}
        </div>
      </div>
      {rec && (
        <div style={{ marginTop:10, paddingTop:10, borderTop:`1px solid ${C.border}`, fontSize:12.5, color:"#B9DADA", lineHeight:1.4 }}>
          {rec.text}
        </div>
      )}
    </div>
  );
}

function WelcomeCard({ onDismiss }) {
  return (
    <div style={{ marginTop:32, borderRadius:20, background:C.card, border:`1px solid ${C.border}`, padding:"24px 20px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
        <div style={{ width:40, height:40, borderRadius:999, background:C.accent+"22", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          <Waves size={20} color={C.accent} />
        </div>
        <div>
          <div style={{ fontFamily:FONT_DISPLAY, fontSize:16, fontWeight:600, lineHeight:1.2 }}>Welcome to Pool Tracker</div>
          <div style={{ fontSize:12, color:C.faint, marginTop:2 }}>Here's how to get started</div>
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:20 }}>
        {[
          { icon:<Settings2 size={15} color={C.accent} />, text:"Set your pool size and type in Settings (sliders icon, top right)" },
          { icon:<Plus size={15} color={C.accent} />,      text:"Tap the + button after each test to log your readings" },
          { icon:<Droplets size={15} color={C.accent} />,  text:"Overview shows your latest results and flags anything out of range" },
        ].map((item, i) => (
          <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
            <div style={{ marginTop:1, flexShrink:0 }}>{item.icon}</div>
            <div style={{ fontSize:13, lineHeight:1.5, color:C.text }}>{item.text}</div>
          </div>
        ))}
      </div>
      <button onClick={onDismiss} className="pd-btn-primary"
        style={{ width:"100%", background:C.accent, color:C.bg, fontWeight:600, borderRadius:12, padding:"10px 0", fontSize:13, border:"none" }}>
        Got it
      </button>
    </div>
  );
}

function Overview({ profile, latest, alerts, tests }) {
  const [welcomed, setWelcomed] = useState(() => !!localStorage.getItem("pool-welcomed"));
  function dismiss() { localStorage.setItem("pool-welcomed","1"); setWelcomed(true); }

  if (!tests.length) return welcomed
    ? (
      <div style={{ marginTop:40, textAlign:"center" }}>
        <FlaskConical size={32} color="#3D6367" style={{ margin:"0 auto 12px" }} />
        <div style={{ fontFamily:FONT_DISPLAY, fontSize:15, marginBottom:4 }}>No tests logged yet</div>
        <div style={{ fontSize:13, color:C.faint }}>Tap the + button to log your first water test.</div>
      </div>
    )
    : <WelcomeCard onDismiss={dismiss} />;
  return (
    <div>
      {alerts.length>0
        ? <div style={{ marginBottom:16, borderRadius:16, background:C.dangerBg, border:`1px solid ${C.dangerBorder}`, padding:"12px 14px" }}>
            {alerts.map(a => (
              <div key={a.def.key} style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"4px 0" }}>
                <AlertTriangle size={15} color={C.danger} style={{ marginTop:2, flexShrink:0 }} />
                <div style={{ fontSize:13, lineHeight:1.4 }}>
                  <span style={{ fontWeight:500 }}>{a.def.label}</span>{" "}
                  <span style={{ color:"#D99" }}>is {a.status==="low"?"below":"above"} target</span>
                </div>
              </div>
            ))}
          </div>
        : <div style={{ marginBottom:16, borderRadius:16, background:C.goodBg, border:`1px solid ${C.goodBorder}`, padding:"12px 14px", display:"flex", alignItems:"center", gap:8 }}>
            <CheckCircle2 size={16} color={C.accent} />
            <span style={{ fontSize:13 }}>Everything's in range</span>
          </div>
      }
      <div style={{ fontFamily:FONT_MONO, fontSize:11, color:C.faint, marginBottom:8, padding:"0 4px" }}>
        LATEST — {new Date(latest.date).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {PARAM_DEFS.map(def => <ParamCard key={def.key} def={def} value={latest[def.key]} profileArg={profile} />)}
      </div>
    </div>
  );
}

function Timeline({ tests, chartParam, setChartParam, chartDef, chartData, profile, onDelete }) {
  const t = profile.targets[chartParam];
  return (
    <div>
      <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:12 }}>
        {PARAM_DEFS.map(d => {
          const active = chartParam===d.key;
          return (
            <button key={d.key} onClick={() => setChartParam(d.key)} className="pd-pill"
              style={{ padding:"6px 12px", borderRadius:999, fontSize:12, flexShrink:0,
                border:`1px solid ${active?d.chip:C.border}`,
                background:active?`${d.chip}22`:"transparent", color:active?C.text:C.faint }}>
              {d.short}
            </button>
          );
        })}
      </div>
      <div style={{ borderRadius:16, background:C.card, border:`1px solid ${C.border}`, padding:12, marginBottom:20, height:200 }}>
        {chartData.length>1
          ? <ResponsiveContainer width="100%" height="100%">
              <LineChart data={chartData} margin={{ top:8, right:8, left:-20, bottom:0 }}>
                <CartesianGrid stroke={C.border} strokeDasharray="3 3" vertical={false} />
                {t && <ReferenceArea y1={t[0]} y2={t[1]} fill={chartDef.chip} fillOpacity={0.08} />}
                <XAxis dataKey="date" tick={{ fill:C.faint, fontSize:10 }} axisLine={{ stroke:C.border }} tickLine={false} />
                <YAxis tick={{ fill:C.faint, fontSize:10 }} axisLine={false} tickLine={false} width={34} />
                <Tooltip contentStyle={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, fontSize:12 }} labelStyle={{ color:C.text }} />
                <Line type="monotone" dataKey="value" stroke={chartDef.chip} strokeWidth={2} dot={{ r:3, fill:chartDef.chip }} />
              </LineChart>
            </ResponsiveContainer>
          : <div style={{ height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12.5, color:C.faint }}>
              Log a couple more {chartDef.label.toLowerCase()} tests to see a trend
            </div>
        }
      </div>
      <div style={{ fontFamily:FONT_MONO, fontSize:11, color:C.faint, marginBottom:8, padding:"0 4px" }}>ALL TESTS ({tests.length})</div>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {[...tests].reverse().map(tst => (
          <div key={tst.id} style={{ borderRadius:12, background:C.card, border:`1px solid ${C.border}`, padding:"12px 14px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontFamily:FONT_MONO, fontSize:12, color:"#9FC2C4" }}>
                {new Date(tst.date).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}
              </span>
              <button onClick={() => onDelete(tst.id)} className="pd-delete" style={{ color:C.faint, background:"none", border:"none" }}>
                <Trash2 size={14} />
              </button>
            </div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"4px 12px" }}>
              {PARAM_DEFS.filter(d=>tst[d.key]!==undefined&&tst[d.key]!=="").map(d => (
                <span key={d.key} style={{ fontSize:12 }}>
                  <span style={{ color:C.faint }}>{d.short} </span>
                  <span style={{ fontFamily:FONT_MONO }}>{tst[d.key]}</span>
                </span>
              ))}
            </div>
            {tst.notes && <div style={{ fontSize:12, color:C.muted, marginTop:6, fontStyle:"italic" }}>{tst.notes}</div>}
          </div>
        ))}
        {tests.length===0 && <div style={{ textAlign:"center", fontSize:13, color:C.faint, padding:"40px 0" }}>No tests yet</div>}
      </div>
    </div>
  );
}

function TestForm({ form, setForm, formErrors, setFormErrors, onSubmit, onClose }) {
  function update(key, val) {
    setForm(f => ({ ...f, [key]:val }));
    if (formErrors[key]) setFormErrors(e => { const n={...e}; delete n[key]; return n; });
  }
  const inputStyle = { width:"100%", background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"10px 14px", fontSize:14, color:C.text };
  const hasErrors = Object.keys(formErrors).length>0;
  return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"24px 20px 16px", borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontFamily:FONT_DISPLAY, fontSize:17, fontWeight:600 }}>New test</div>
        <button onClick={onClose} className="pd-icon-btn" style={{ width:32, height:32, borderRadius:999, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <X size={18} color={C.faint} />
        </button>
      </div>
      <form onSubmit={onSubmit} style={{ flex:1, overflowY:"auto", padding:"16px 20px", maxWidth:448, margin:"0 auto", width:"100%" }}>
        <label style={{ display:"block", fontSize:12, color:C.muted, marginBottom:6 }}>Date &amp; time</label>
        <input type="datetime-local" value={form.date||""} onChange={e=>update("date",e.target.value)}
          required className="pd-input" style={{ ...inputStyle, marginBottom:16, fontFamily:FONT_MONO }} />

        {hasErrors && (
          <div style={{ marginBottom:12, borderRadius:10, background:C.dangerBg, border:`1px solid ${C.dangerBorder}`, padding:"10px 14px" }}>
            {Object.values(formErrors).map((msg,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:8, fontSize:12, color:C.danger, padding:"2px 0" }}>
                <AlertTriangle size={12} />{msg}
              </div>
            ))}
          </div>
        )}

        <div style={{ display:"grid", gridTemplateColumns:"repeat(2,minmax(0,1fr))", gap:12, marginBottom:16 }}>
          {PARAM_DEFS.map(d => {
            const hasErr = !!formErrors[d.key];
            return (
              <div key={d.key}>
                <label style={{ display:"flex", alignItems:"center", gap:8, fontSize:12, color:hasErr?C.danger:C.muted, marginBottom:6 }}>
                  <span style={{ width:8, height:8, borderRadius:999, background:d.chip, display:"inline-block" }} />
                  {d.short}{d.unit?` (${d.unit})`:""}
                </label>
                <input type="number" step="any" min={d.min} max={d.max}
                  value={form[d.key]??""} onChange={e=>update(d.key,e.target.value)}
                  placeholder="—" className="pd-input"
                  style={{ ...inputStyle, fontFamily:FONT_MONO, borderColor:hasErr?C.danger:C.border }} />
              </div>
            );
          })}
        </div>

        <label style={{ display:"block", fontSize:12, color:C.muted, marginBottom:6 }}>Notes</label>
        <textarea value={form.notes||""} onChange={e=>update("notes",e.target.value)}
          rows={2} placeholder="Anything worth remembering…" className="pd-input"
          style={{ ...inputStyle, marginBottom:24, resize:"none" }} />

        <button type="submit" className="pd-btn-primary"
          style={{ width:"100%", background:C.accent, color:C.bg, fontWeight:600, borderRadius:12, padding:12, fontSize:14, border:"none" }}>
          Save test
        </button>
      </form>
    </div>
  );
}

function SettingsPanel({ draft, setDraft, onSave, onCancel }) {
  function updateTarget(key, idx, val) {
    setDraft(d => { const targets={...d.targets}; const pair=[...targets[key]]; pair[idx]=parseFloat(val); targets[key]=pair; return {...d,targets}; });
  }
  const inputStyle = { width:"100%", background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"10px 14px", fontSize:14, color:C.text };
  const labelStyle = { display:"block", fontSize:12, color:C.muted, marginBottom:6 };

  function PillGroup({ sectionLabel, options, value, onChange }) {
    return (
      <>
        <div style={{ fontFamily:FONT_MONO, fontSize:11, color:C.faint, marginBottom:8 }}>{sectionLabel}</div>
        <div style={{ display:"flex", gap:6, marginBottom:10 }}>
          {options.map(opt => {
            const active = value===opt.key;
            return (
              <button key={opt.key} onClick={() => onChange(opt.key)} className="pd-pill"
                style={{ flex:1, padding:"8px 6px", borderRadius:10, fontSize:12, textAlign:"center",
                  border:`1px solid ${active?C.accent:C.border}`,
                  background:active?`${C.accent}1A`:"transparent", color:active?C.text:C.muted }}>
                {opt.label}
              </button>
            );
          })}
        </div>
      </>
    );
  }

  return (
    <div>
      <div style={{ fontFamily:FONT_DISPLAY, fontSize:15, fontWeight:600, marginBottom:16 }}>Pool settings</div>

      <label style={labelStyle}>Pool name</label>
      <input value={draft.name} onChange={e=>setDraft({...draft,name:e.target.value})}
        className="pd-input" style={{ ...inputStyle, marginBottom:16 }} />

      <label style={labelStyle}>Volume (litres)</label>
      <input type="number" value={draft.volumeL} onChange={e=>setDraft({...draft,volumeL:parseFloat(e.target.value)||0})}
        className="pd-input" style={{ ...inputStyle, marginBottom:16, fontFamily:FONT_MONO }} />

      <PillGroup sectionLabel="POOL TYPE"
        options={[{key:"saltwater",label:"Saltwater (SWG)"},{key:"traditional",label:"Traditional Chlorine"}]}
        value={draft.poolType} onChange={v=>setDraft({...draft,poolType:v})} />
      <div style={{ marginBottom:12 }} />

      <PillGroup sectionLabel="CHLORINE — BACKUP / TOP-UP"
        options={[{key:"calhypo",label:"Cal-Hypo Shock"},{key:"pucks",label:"Pucks"},{key:"liquid",label:"Liquid"}]}
        value={draft.chlorineBoost} onChange={v=>setDraft({...draft,chlorineBoost:v})} />

      {draft.chlorineBoost==="calhypo" && (
        <div style={{ marginBottom:20 }}>
          <label style={labelStyle}>Cal-hypo available chlorine %</label>
          <input type="number" value={draft.calHypoPct} onChange={e=>setDraft({...draft,calHypoPct:parseFloat(e.target.value)||0})}
            className="pd-input" style={{ ...inputStyle, fontFamily:FONT_MONO }} />
        </div>
      )}
      {draft.chlorineBoost==="liquid" && (
        <div style={{ marginBottom:20 }}>
          <label style={labelStyle}>Liquid chlorine %</label>
          <input type="number" value={draft.liquidChlorinePct} onChange={e=>setDraft({...draft,liquidChlorinePct:parseFloat(e.target.value)||0})}
            className="pd-input" style={{ ...inputStyle, fontFamily:FONT_MONO }} />
        </div>
      )}
      {draft.chlorineBoost==="pucks" && (
        <div style={{ fontSize:12, color:C.faint, marginBottom:20, lineHeight:1.4 }}>
          Pucks dissolve slowly — keep a shock around for fast bumps.
        </div>
      )}

      <PillGroup sectionLabel="LOWERING PH"
        options={[{key:"phminus",label:"pH Minus (dry)"},{key:"muriatic",label:"Muriatic (liquid)"}]}
        value={draft.phLowerMethod} onChange={v=>setDraft({...draft,phLowerMethod:v})} />

      {draft.phLowerMethod==="muriatic" && (
        <div style={{ marginBottom:20 }}>
          <label style={labelStyle}>Muriatic acid %</label>
          <input type="number" value={draft.muriaticPct} onChange={e=>setDraft({...draft,muriaticPct:parseFloat(e.target.value)||0})}
            className="pd-input" style={{ ...inputStyle, fontFamily:FONT_MONO }} />
        </div>
      )}
      {draft.phLowerMethod==="phminus" && (
        <div style={{ fontSize:12, color:C.faint, marginBottom:20, lineHeight:1.4 }}>
          Dosing uses standard dry-acid conversion (±20%) — dose in steps and retest.
        </div>
      )}

      <div style={{ fontFamily:FONT_MONO, fontSize:11, color:C.faint, marginBottom:8 }}>TARGET RANGES</div>
      <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:24 }}>
        {PARAM_DEFS.map(d => (
          <div key={d.key} style={{ display:"flex", alignItems:"center", gap:12 }}>
            <span style={{ width:8, height:8, borderRadius:999, background:d.chip, flexShrink:0, display:"inline-block" }} />
            <span style={{ fontSize:13, width:128, flexShrink:0 }}>{d.label}</span>
            <input type="number" value={draft.targets[d.key][0]} onChange={e=>updateTarget(d.key,0,e.target.value)}
              className="pd-input" style={{ ...inputStyle, borderRadius:8, padding:"6px 10px", fontFamily:FONT_MONO }} />
            <span style={{ color:C.faint }}>–</span>
            <input type="number" value={draft.targets[d.key][1]} onChange={e=>updateTarget(d.key,1,e.target.value)}
              className="pd-input" style={{ ...inputStyle, borderRadius:8, padding:"6px 10px", fontFamily:FONT_MONO }} />
          </div>
        ))}
      </div>

      <div style={{ display:"flex", gap:12, marginBottom:24 }}>
        <button onClick={onCancel} style={{ flex:1, border:`1px solid ${C.border}`, borderRadius:12, padding:12, fontSize:14, color:C.muted, background:"none" }}>Cancel</button>
        <button onClick={onSave} className="pd-btn-primary" style={{ flex:1, background:C.accent, color:C.bg, fontWeight:600, borderRadius:12, padding:12, fontSize:14, border:"none" }}>Save</button>
      </div>

      <div style={{ display:"flex", alignItems:"flex-start", gap:8, fontSize:11, color:C.faint, lineHeight:1.5, paddingBottom:16 }}>
        <ChevronRight size={13} style={{ marginTop:2, flexShrink:0 }} />
        Target ranges are standard guidelines — salt and CYA vary by SWG brand, check your chlorinator's manual. Dose in steps, retest.
      </div>
    </div>
  );
}

function App() {
  const [profile, setProfile] = useState(DEFAULT_PROFILE);
  const [tests, setTests]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab]         = useState("overview");
  const [showForm, setShowForm]     = useState(false);
  const [form, setForm]             = useState({});
  const [formErrors, setFormErrors] = useState({});
  const [chartParam, setChartParam] = useState("fc");
  const [settingsDraft, setSettingsDraft] = useState(null);
  const [toast, showToast] = useToast();

  useEffect(() => {
    const p = loadJSON("pool-profile", DEFAULT_PROFILE);
    const t = loadJSON("pool-tests", []);
    setProfile({ ...DEFAULT_PROFILE, ...p, targets:{ ...DEFAULT_TARGETS, ...(p.targets||{}) } });
    setTests(t);
    setLoading(false);
  }, []);

  const latest = tests.length ? tests[tests.length-1] : null;

  const alerts = useMemo(() => {
    if (!latest) return [];
    return PARAM_DEFS.filter(d=>!d.infoOnly)
      .map(d => ({ def:d, status:statusFor(d.key,latest[d.key],profile.targets) }))
      .filter(a=>a.status==="low"||a.status==="high");
  }, [latest, profile.targets]);

  function persistTests(next) {
    setTests(next);
    const ok = saveJSON("pool-tests", next);
    showToast(ok?"Test saved":"Save failed — check storage", ok?"ok":"err");
  }
  function persistProfile(next) {
    setProfile(next);
    const ok = saveJSON("pool-profile", next);
    showToast(ok?"Settings saved":"Save failed — check storage", ok?"ok":"err");
  }

  function openNewTest() {
    const now = new Date(); setForm({ date: new Date(now - now.getTimezoneOffset()*60000).toISOString().slice(0,16) });
    setFormErrors({});
    setShowForm(true);
  }
  function submitTest(e) {
    e.preventDefault();
    const errors = validateForm(form);
    if (Object.keys(errors).length>0) { setFormErrors(errors); return; }
    const entry = { id:uid(), ...form };
    const next  = [...tests, entry].sort((a,b)=>new Date(a.date)-new Date(b.date));
    persistTests(next);
    setShowForm(false); setForm({}); setFormErrors({}); setTab("overview");
  }
  function deleteTest(id) {
    const next = tests.filter(t=>t.id!==id);
    setTests(next);
    if (!saveJSON("pool-tests",next)) showToast("Delete failed","err");
  }
  function openSettings() { setSettingsDraft(JSON.parse(JSON.stringify(profile))); setTab("settings"); }
  function saveSettings()  { persistProfile(settingsDraft); setTab("overview"); }

  const chartDef  = PARAM_DEFS.find(d=>d.key===chartParam);
  const chartData = tests
    .filter(t=>t[chartParam]!==undefined&&t[chartParam]!=="")
    .map(t=>({ date:new Date(t.date).toLocaleDateString(undefined,{month:"short",day:"numeric"}), value:parseFloat(t[chartParam]) }));

  return (
    <div style={{ fontFamily:FONT_BODY, background:C.bg, color:C.text, minHeight:"100vh" }}>
      <style>{GLOBAL_CSS}</style>
      <Toast toast={toast} />

      {showForm
        ? <TestForm form={form} setForm={setForm} formErrors={formErrors} setFormErrors={setFormErrors}
            onSubmit={submitTest} onClose={() => { setShowForm(false); setFormErrors({}); }} />
        : <>
            <div style={{ position:"sticky", top:0, zIndex:20, background:C.bg, borderBottom:`1px solid ${C.border}`, padding:"24px 20px 16px" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ width:36, height:36, borderRadius:999, background:C.card, border:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <Waves size={18} color={C.accent} />
                  </div>
                  <div>
                    <div style={{ fontFamily:FONT_DISPLAY, fontSize:17, fontWeight:600, lineHeight:1.15 }}>{profile.name}</div>
                    <div style={{ fontFamily:FONT_MONO, fontSize:11, color:C.faint, lineHeight:1.3 }}>
                      {profile.volumeL.toLocaleString()} L · {profile.poolType==="saltwater"?"saltwater":"traditional chlorine"}
                    </div>
                  </div>
                </div>
                <button onClick={openSettings} className="pd-icon-btn" style={{ width:36, height:36, borderRadius:999, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Settings2 size={18} color={C.faint} />
                </button>
              </div>
            </div>

            <div style={{ maxWidth:448, margin:"0 auto", padding:"16px 20px 110px" }}>
              {loading && <div style={{ textAlign:"center", color:C.faint, padding:"64px 0", fontSize:14 }}>loading your pool…</div>}
              {!loading && tab==="overview"  && <Overview profile={profile} latest={latest} alerts={alerts} tests={tests} />}
              {!loading && tab==="timeline"  && <Timeline tests={tests} chartParam={chartParam} setChartParam={setChartParam} chartDef={chartDef} chartData={chartData} profile={profile} onDelete={deleteTest} />}
              {!loading && tab==="settings" && settingsDraft && <SettingsPanel draft={settingsDraft} setDraft={setSettingsDraft} onSave={saveSettings} onCancel={()=>setTab("overview")} />}
            </div>

            <div style={{ position:"sticky", bottom:0, maxWidth:448, margin:"0 auto", background:C.bg, borderTop:`1px solid ${C.border}`, padding:"10px 20px" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <NavButton active={tab==="overview"} onClick={()=>setTab("overview")} icon={<Droplets size={18} />} label="Overview" />
                <button onClick={openNewTest} className="pd-btn-primary"
                  style={{ width:48, height:48, borderRadius:999, background:C.accent, marginTop:-24,
                           boxShadow:`0 8px 20px ${C.accent}33`, display:"flex", alignItems:"center", justifyContent:"center", border:"none" }}>
                  <Plus size={22} color={C.bg} strokeWidth={2.5} />
                </button>
                <NavButton active={tab==="timeline"} onClick={()=>setTab("timeline")} icon={<ListPlus size={18} />} label="Timeline" />
              </div>
            </div>
          </>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
